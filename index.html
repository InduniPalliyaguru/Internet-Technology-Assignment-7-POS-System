<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="main-App">
        <header>
            <nav class="navbar navbar-expand-lg custom-navbar" style="padding: 0.2%;">
                <div class="container-fluid">
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="nav nav-pills" id="pills-tab" role="tablist"
                            style="justify-content: space-between; width: 100%;">
                            <div>
                                <img src="assets/logo.png" alt="logo">
                            </div>
                            <div class="nav-bar" style="display: flex; align-items: center;">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="pills-home-tab" data-bs-toggle="pill"
                                        data-bs-target="#pills-home" type="button" role="tab" aria-controls="pills-home"
                                        aria-selected="true">Home</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="pills-customer-tab" data-bs-toggle="pill"
                                        data-bs-target="#pills-customer" type="button" role="tab"
                                        aria-controls="pills-customer" aria-selected="false">Customer</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="pills-item-tab" data-bs-toggle="pill"
                                        data-bs-target="#pills-item" type="button" role="tab" aria-controls="pills-item"
                                        aria-selected="false">Item</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="pills-order-tab" data-bs-toggle="pill"
                                        data-bs-target="#pills-order" type="button" role="tab"
                                        aria-controls="pills-order" aria-selected="false">Orders</button>
                                </li>
                            </div>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
    </div>

    <main class="tab-content" id="pills-tabContent">
        <section class="tab-pane fade show active" id="pills-home" role="tabpanel" aria-labelledby="pills-home-tab"
            tabindex="0">
            <div class="container-fluid d-flex flex-column" style="background-color: #2C576D;">
                <div class="d-flex justify-content-end p-3">
                    <div class="logout d-flex">
                        <button type="button" class="btn btn-dark d-flex align-items-center p-3 gap-2" id="logout-button">Logout
                            <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        </button>
                    </div>
                </div>

                <div class="row row-cols-1 row-cols-md-2 row-cols-xl-2 g-5 pb-5 pt-5" style=" justify-content: center;">
                    <div class="col-md-4 col-xl-5">
                        <div class="card p-4 mb-4 shadow rounded-4">
                            <div class="card-body">
                                <div class="d-flex align-items-center justify-content-around">
                                    <i class="fa-solid fa-dollar-sign fa-4x" style="color: rgb(38, 139, 29);"></i>
                                    <div>
                                        <h5 class="card-title mb-0 fw-bold fa-2x">Total Sales</h5>
                                        <p class="card-text fs-4" id="totalSalesMetric">$0.00</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4 col-xl-5">
                        <div class="card p-4 mb-4 shadow rounded-4">
                            <div class="card-body">
                                <div class="d-flex align-items-center justify-content-around">
                                    <i class="fa-solid fa-cart-arrow-down fa-4x" style="color: rgb(44, 61, 165);"></i>
                                    <div>
                                        <h5 class="card-title mb-0 fw-bold fa-2x">Total Orders</h5>
                                        <p class="card-text fs-4" id="totalSalesMetric">0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4 col-xl-5">
                        <div class="card p-4 mb-4 shadow rounded-4">
                            <div class="card-body">
                                <div class="d-flex align-items-center justify-content-around">
                                     <i class="fa-solid fa-users fa-4x" style="color: rgb(116, 192, 252);"></i>
                                    <div>
                                        <h5 class="card-title mb-0 fw-bold fa-2x">All Customers</h5>
                                        <p class="card-text fs-4" id="totalSalesMetric">0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4 col-xl-5">
                        <div class="card p-4 mb-4 shadow rounded-4">
                            <div class="card-body">
                                <div class="d-flex align-items-center justify-content-around">
                                     <i class="fa-solid fa-box-open fa-4x" style="color: rgb(255, 212, 60);"></i>
                                    <div>
                                        <h5 class="card-title mb-0 fw-bold fa-2x">Total Items</h5>
                                        <p class="card-text fs-4" id="totalSalesMetric">0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>




        </section>

        <section class="tab-pane fade" id="pills-customer" role="tabpanel" aria-labelledby="pills-customer-tab"
            tabindex="0">

            customerPage

        </section>

        <section class="tab-pane fade" id="pills-item" role="tabpanel" aria-labelledby="pills-item-tab" tabindex="0">

            itemPage

        </section>

        <section class="tab-pane fade" id="pills-order" role="tabpanel" aria-labelledby="pills-order-tab" tabindex="0">

            orderPage

        </section>
    </main>

    <footer class="footer">
    <div class="container-fluid text-white text-center py-3" style="background-color: #0F1D24;">
        <span>&copy; All Rights Reserved | Induni Palliyaguru</span>
    </div>
</footer>






    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
